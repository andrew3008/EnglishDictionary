# Минимальный Collector для extension smoke: OTLP gRPC → file exporter (NDJSON).
# Путь /tmp/spans.json — writable в scratch-образе без bind mount (remote Docker).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  file:
    path: /tmp/spans.json
    flush_interval: 1s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file]
