allprojects {
    group = 'space.br1440.platform.tracing'
    version = project.findProperty('platformTracingVersion') ?: '0.1.0-SNAPSHOT'

    repositories {
        mavenLocal()
        // Публичные репозитории служат fallback при недоступности корпоративного n.1440.space.
        mavenCentral()
        maven { url = "https://n.1440.space/repository/platform-maven/" }
        maven { url = "https://n.1440.space/repository/platform-maven-dev/" }
        maven { url = "https://n.1440.space/repository/repo1.maven.org-proxy" }
        maven { url = uri("https://n.1440.space/repository/plugins.gradle.org-proxy/") }
    }
}

subprojects {
    apply plugin: 'maven-publish'

    // BOM-модуль публикуется как java-platform; остальные подпроекты — как java-library.
    if (it.name != 'platform-tracing-bom') {
        apply plugin: 'java-library'

        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(21)
            }
            withSourcesJar()
            withJavadocJar()
        }

        // Платформенный BOM подключается во все конфигурации, где могут разрешаться зависимости.
        // Это обеспечивает согласованные версии в compileOnly, annotationProcessor, testImplementation
        // и прочих производных конфигурациях без дублирования в каждом build.gradle.
        dependencies {
            compileOnly platform(project(':platform-tracing-bom'))
            annotationProcessor platform(project(':platform-tracing-bom'))
            testImplementation platform(project(':platform-tracing-bom'))
            testCompileOnly platform(project(':platform-tracing-bom'))
            testAnnotationProcessor platform(project(':platform-tracing-bom'))
        }

        test {
            useJUnitPlatform()

            // Опциональный strict context checker OpenTelemetry: активирует StrictContextStorage,
            // который логирует/падает при незакрытых Scope'ах. Используется в CI-профиле
            // и при локальной диагностике подозрений на утечку scope. Включается через
            // -PstrictContext=true (см. также opentelemetry-sdk-testing в зависимостях
            // platform-tracing-test). Не включаем по умолчанию, чтобы не замедлять обычный
            // прогон unit-тестов и не вызывать false-positives в библиотечном коде, где Scope
            // умышленно остаётся открытым между layer'ами (например, ServletRequest lifecycle).
            if (project.hasProperty('strictContext') && project.property('strictContext') == 'true') {
                systemProperty 'io.opentelemetry.context.enableStrictContext', 'true'
            }
        }

        tasks.withType(Javadoc).configureEach {
            options.addStringOption('Xdoclint:none', '-quiet')
        }
    }

    afterEvaluate { project ->
        publishing {
            if (project.plugins.hasPlugin('java-library') || project.plugins.hasPlugin('java')) {
                publications {
                    mavenJava(MavenPublication) {
                        from components.java
                    }
                }
            } else {
                publications {
                    mavenJava(MavenPublication) {
                        from components.javaPlatform
                    }
                }
            }
            repositories {
                maven {
                    name = 'c3Verification'
                    url = rootProject.layout.buildDirectory.dir('c3-maven-repository')
                }
                maven {
                    if (project.version.toString().endsWith('-SNAPSHOT')) {
                        name = 'snapshotRepo'
                        url = uri("https://n.1440.space/repository/platform-maven-dev")
                        credentials {
                            username = System.getenv("NEXUS_USERNAME")
                            password = System.getenv("NEXUS_PASSWORD")
                        }
                    } else {
                        name = 'releaseRepo'
                        url = uri("https://n.1440.space/repository/platform-maven")
                        credentials {
                            username = System.getenv("PROD_NEXUS_USERNAME")
                            password = System.getenv("PROD_NEXUS_PASSWORD")
                        }
                    }
                }
            }
        }
    }
}

// Агрегирующая задача: публикация всех артефактов в корпоративный Nexus.
tasks.register("publishAllToNexus") {
    dependsOn subprojects.publish
}

