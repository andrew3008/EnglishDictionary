def c3PublishedProjects = [
        ':platform-tracing-bom',
        ':platform-tracing-api',
        ':platform-tracing-otel',
        ':platform-tracing-spring-boot-autoconfigure',
        ':platform-tracing-autoconfigure-webmvc',
        ':platform-tracing-spring-boot-starter-servlet'
]

tasks.register('c3PublishedMetadataConsumerVerify') {
    group = 'verification'
    description = 'Verifies C3 compile/runtime boundaries using isolated published metadata.'

    doLast {
        File repository = layout.buildDirectory.dir('c3-maven-repository').get().asFile
        File fixture = file('gradle/c3-published-consumer')
        File wrapper = file(System.getProperty('os.name').toLowerCase().contains('windows')
                ? 'gradlew.bat' : 'gradlew')

        def runFixture = { String taskName ->
            List<String> command = []
            if (System.getProperty('os.name').toLowerCase().contains('windows')) {
                command.addAll(['cmd.exe', '/d', '/c'])
            }
            command.add(wrapper.absolutePath)
            command.addAll([
                    '-p', fixture.absolutePath,
                    taskName,
                    "-Pc3Repository=${repository.absolutePath}",
                    "-PplatformTracingVersion=${project.version}",
                    '--no-daemon'
            ])

            Process process = new ProcessBuilder(command.collect { it.toString() })
                    .directory(rootDir)
                    .redirectErrorStream(true)
                    .start()
            String output = process.inputStream.getText('UTF-8')
            int exitCode = process.waitFor()
            return [exitCode: exitCode, output: output]
        }

        def positive = runFixture('verifyPublishedConsumer')
        if (positive.exitCode != 0) {
            throw new GradleException("C3 published consumer verification failed:\n${positive.output}")
        }

        def negative = runFixture('compileNegativeJava')
        if (negative.exitCode == 0) {
            throw new GradleException('C3 negative compile unexpectedly succeeded: core leaked onto compileClasspath')
        }
        if (!negative.output.contains('space.br1440.platform.tracing.core.runtime.otel')) {
            throw new GradleException("C3 negative compile failed for an unexpected reason:\n${negative.output}")
        }

        logger.lifecycle('C3 published metadata consumer verification passed')
    }
}

gradle.projectsEvaluated {
    tasks.named('c3PublishedMetadataConsumerVerify').configure {
        dependsOn c3PublishedProjects.collect { path ->
            project(path).tasks.named('publishMavenJavaPublicationToC3VerificationRepository')
        }
    }
}

// Проверка согласованности OTel instrumentation BOM и alpha-версии extension API.
tasks.register('verifyOtelBomAlignment') {
    group = 'verification'
    description = 'Verifies that OpenTelemetry instrumentation alpha version is aligned with instrumentation BOM version.'
    notCompatibleWithConfigurationCache(
            'Reads Gradle properties at execution time for version alignment check')

    def instrumentationBomVersionProvider =
            providers.gradleProperty('openTelemetryInstrumentationBomVersion')
    def instrumentationAlphaVersionProvider =
            providers.gradleProperty('openTelemetryInstrumentationAlphaVersion')

    doLast {
        def instrumentationBomVersion = instrumentationBomVersionProvider.orNull?.trim()
        def instrumentationAlphaVersion = instrumentationAlphaVersionProvider.orNull?.trim()

        if (!instrumentationBomVersion) {
            throw new GradleException(
                    'Missing required Gradle property: openTelemetryInstrumentationBomVersion')
        }
        if (!instrumentationAlphaVersion) {
            throw new GradleException(
                    'Missing required Gradle property: openTelemetryInstrumentationAlphaVersion')
        }

        def expectedAlphaVersion = "${instrumentationBomVersion}-alpha"
        if (instrumentationAlphaVersion != expectedAlphaVersion) {
            throw new GradleException(
                    "OpenTelemetry version mismatch: " +
                    "openTelemetryInstrumentationAlphaVersion=${instrumentationAlphaVersion}, " +
                    "expected ${expectedAlphaVersion} based on " +
                    "openTelemetryInstrumentationBomVersion=${instrumentationBomVersion}")
        }
    }
}

gradle.projectsEvaluated {
    subprojects.each { sub ->
        sub.tasks.matching { it.name == 'check' }.configureEach {
            dependsOn rootProject.tasks.named('verifyOtelBomAlignment')
        }
    }
}

// ---------------------------------------------------------------------------------------------
// PR-0 — Baseline lock helpers (docs/architecture/pr-0-*.md).
// Verification-only tasks: no production code, no test deletion, no module collapse.
// ---------------------------------------------------------------------------------------------

def pr0SnapshotModules = [
        'platform-tracing-api',
        'platform-tracing-otel',
        'platform-tracing-otel-extension',
        'platform-tracing-spring-boot-autoconfigure',
        'platform-tracing-autoconfigure-webmvc',
        'platform-tracing-autoconfigure-webflux',
        'platform-tracing-spring-boot-starter-servlet',
        'platform-tracing-spring-boot-starter-reactive',
]

def pr0SnapshotDir = layout.projectDirectory.dir('docs/architecture/baselines/pr-0/dependency-snapshot')

def pr0GitShaProvider = providers.exec {
    commandLine 'git', 'rev-parse', '--short', 'HEAD'
    ignoreExitValue = true
}.standardOutput.asText.map { it.trim() ?: 'unknown' }

tasks.register('pr0DependencySnapshot') {
    group = 'pr0'
    description = 'Writes resolved dependency trees for PR-0 migration baseline modules.'
    notCompatibleWithConfigurationCache('Resolves dependency graphs at execution time')

    pr0SnapshotModules.each { moduleName ->
        def sub = project(':' + moduleName)
        dependsOn sub.tasks.matching { it.name == 'compileJava' }
    }

    inputs.property('modules', pr0SnapshotModules)
    outputs.dir(pr0SnapshotDir)

    doLast {
        def outDir = pr0SnapshotDir.asFile
        outDir.mkdirs()

        pr0SnapshotModules.each { moduleName ->
            def sub = project(':' + moduleName)
            def sb = new StringBuilder()
            sb.append("Module: ${moduleName}\n")
            sb.append("Generated: ${new Date()}\n\n")

            ['compileClasspath', 'runtimeClasspath', 'apiElements'].each { cfgName ->
                def cfg = sub.configurations.findByName(cfgName)
                if (cfg == null || !cfg.canBeResolved) {
                    return
                }
                sb.append("--- ${cfgName} (first-level) ---\n")
                try {
                    cfg.resolvedConfiguration.firstLevelModuleDependencies.sort { it.name }.each { dep ->
                        sb.append("  ${dep.moduleGroup}:${dep.moduleName}:${dep.moduleVersion}\n")
                    }
                } catch (Exception e) {
                    sb.append("  (unresolved: ${e.message})\n")
                }
                sb.append('\n')
            }

            new File(outDir, "${moduleName}.txt").text = sb.toString()
        }

        def metadata = [
                savedAt          : new Date().format("yyyy-MM-dd'T'HH:mm:ssXXX"),
                gitSha           : pr0GitShaProvider.get(),
                jdk              : System.getProperty('java.version'),
                osName           : System.getProperty('os.name'),
                osArch           : System.getProperty('os.arch'),
                cpuCores         : Runtime.runtime.availableProcessors(),
                gradleVersion    : gradle.gradleVersion,
                modules          : pr0SnapshotModules,
        ]
        new File(outDir.parentFile, 'dependency-snapshot-metadata.json').text =
                groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(metadata))

        logger.lifecycle('PR-0 dependency snapshot written to {}', outDir)
    }
}

tasks.register('pr0StarterDependencySmoke') {
    group = 'pr0'
    description = 'Verifies public starter dependency expectations for PR-0 baseline (no production changes).'
    notCompatibleWithConfigurationCache('Resolves starter dependency graphs at execution time')

    dependsOn ':platform-tracing-spring-boot-starter-servlet:compileJava',
            ':platform-tracing-spring-boot-starter-reactive:compileJava'

    doLast {
        def collectProjectNames = { Project starter, String cfgName ->
            def cfg = starter.configurations.findByName(cfgName)
            if (cfg == null || !cfg.canBeResolved) {
                return [] as Set
            }
            def names = [] as Set
            cfg.resolvedConfiguration.lenientConfiguration.allModuleDependencies.each { dep ->
                if (dep.moduleGroup == 'space.br1440.platform.tracing') {
                    names << dep.moduleName
                }
            }
            return names
        }

        def assertStarter = { String starterName, Set required, Set forbidden, Set forbiddenTransitive ->
            def starter = project(':' + starterName)
            def compileNames = collectProjectNames(starter, 'compileClasspath')
            def runtimeNames = collectProjectNames(starter, 'runtimeClasspath')
            def allNames = compileNames + runtimeNames

            required.each { req ->
                if (!allNames.contains(req)) {
                    throw new GradleException(
                            "PR-0 starter smoke FAIL: ${starterName} missing required platform module '${req}'. " +
                                    "Found: ${allNames.sort()}")
                }
            }
            forbidden.each { ban ->
                if (compileNames.contains(ban)) {
                    throw new GradleException(
                            "PR-0 starter smoke FAIL: ${starterName} must not declare '${ban}' on compileClasspath. " +
                                    "Application teams use BOM + exactly one starter.")
                }
            }
            forbiddenTransitive.each { ban ->
                if (allNames.contains(ban)) {
                    throw new GradleException(
                            "PR-0 starter smoke FAIL: ${starterName} transitively pulls '${ban}'. " +
                                    "Agent extension must not enter application classpath via starter.")
                }
            }
            logger.lifecycle('PR-0 starter smoke OK: {} (platform modules: {})', starterName, allNames.sort())
        }

        assertStarter(
                'platform-tracing-spring-boot-starter-servlet',
                ['platform-tracing-spring-boot-autoconfigure', 'platform-tracing-autoconfigure-webmvc'] as Set,
                ['platform-tracing-autoconfigure-webflux', 'platform-tracing-otel-extension'] as Set,
                ['platform-tracing-otel-extension'] as Set
        )
        assertStarter(
                'platform-tracing-spring-boot-starter-reactive',
                ['platform-tracing-spring-boot-autoconfigure', 'platform-tracing-autoconfigure-webflux'] as Set,
                ['platform-tracing-autoconfigure-webmvc', 'platform-tracing-otel-extension'] as Set,
                ['platform-tracing-otel-extension'] as Set
        )

        def reportDir = layout.projectDirectory.dir('docs/architecture/baselines/pr-0').asFile
        reportDir.mkdirs()
        new File(reportDir, 'starter-dependency-smoke.txt').text = """\
PR-0 starter dependency smoke — PASSED
Date: ${new Date()}
Git: ${pr0GitShaProvider.get()}

Expectations verified:
- platform-tracing-spring-boot-starter-servlet → autoconfigure + webmvc (not webflux, not otel-extension)
- platform-tracing-spring-boot-starter-reactive → autoconfigure + webflux (not webmvc, not otel-extension)
- platform-tracing-otel-extension not on application classpath via either starter

Consumer rule (documented, not enforced here):
- Application teams: BOM + exactly one starter
- Do not depend directly on core / otel-extension / autoconfigure modules
""".stripIndent()
    }
}

tasks.register('pr0BaselineLockAutomated') {
    group = 'pr0'
    description = 'Runs automated PR-0 checks: unit test gate (check), dependency snapshot, starter smoke.'
    dependsOn 'pr0DependencySnapshot', 'pr0StarterDependencySmoke'
    dependsOn subprojects.collect { it.tasks.matching { task -> task.name == 'check' } }
}

