    group = 'pr0'
    description = 'PR-0 entry point: runs automated checks and prints manual baseline steps (JMH, e2e, perf).'
    dependsOn 'pr0BaselineLockAutomated'
    doLast {
        logger.lifecycle('')
        logger.lifecycle('PR-0 automated checks completed. Manual steps (see docs/architecture/pr-0-baseline-checklist.md):')
        logger.lifecycle('  ./gradlew :platform-tracing-bench:jmh')
        logger.lifecycle('  ./gradlew :platform-tracing-bench:jmhSaveBaseline')
        logger.lifecycle('  ./gradlew :platform-tracing-bench:performanceReleaseGate')
        logger.lifecycle('  ./gradlew :platform-tracing-e2e-tests:test -PrunE2e')
        logger.lifecycle('  Macro perf: platform-tracing-perf-tests/scripts/run-perf-scenario.ps1 -Scenario m0|m5|m10|m10c|m10d')
        logger.lifecycle('  Fill results: copy docs/architecture/pr-0-baseline-results-template.md → pr-0-baseline-results-<date>.md')
        logger.lifecycle('')
    }
}

