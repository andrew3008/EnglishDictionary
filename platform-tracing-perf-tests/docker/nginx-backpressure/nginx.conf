# M8b (overloaded Collector): имитация backpressure-сигналов 429/503 (REQ-BACKPRESSURE-001).
# split_clients детерминированно делит трафик: 60% — 429 Too Many Requests (+Retry-After),
# 40% — 503 Service Unavailable. SDK обязан реагировать без unbounded retries и роста RSS
# (бюджеты degraded-no-oom / degraded-p99).
worker_processes 1;
events { worker_connections 1024; }

http {
    # Ключ деления — request_id: равномерное распределение независимо от клиента.
    split_clients "${request_id}" $backpressure_status {
        60% 429;
        *   503;
    }

    server {
        listen 4318;

        location / {
            add_header Retry-After 1 always;
            return $backpressure_status;
        }
    }
}
