description = 'Macro/load/RSS evidence harness (PR-9H-C): hybrid SMOKE + REFERENCE tiers. ' +
        'Representative Spring Boot perf app + k6 scenario skeletons + scenario profiles S0–S6. ' +
        'SMOKE tier is functional-only and non-authoritative. REFERENCE tier (Kubernetes) is future PR. ' +
        'Module NOT published to Nexus; production modules must NOT depend on it.'

buildscript {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven { url = "https://n.1440.space/repository/platform-maven/" }
        maven { url = "https://n.1440.space/repository/repo1.maven.org-proxy" }
    }
    dependencies {
        classpath "org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}"
    }
}
apply plugin: 'org.springframework.boot'

afterEvaluate {
    tasks.matching { it.name.startsWith("publish") }.configureEach { it.enabled = false }
}
sourcesJar.enabled = false
javadocJar.enabled = false

configurations {
    otelJavaAgent
}

dependencies {
    implementation platform(project(':platform-tracing-bom'))
    implementation project(':platform-tracing-spring-boot-starter-servlet')
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'com.networknt:json-schema-validator:1.5.6'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    otelJavaAgent "io.opentelemetry.javaagent:opentelemetry-javaagent:${openTelemetryInstrumentationBomVersion}"
}

bootRun {
    systemProperty 'spring.profiles.active',
            project.findProperty('perfProfiles') ?: 'smoke'
}

ext.resolveGitSha = {
    try {
        def out = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-parse', '--short', 'HEAD'
            standardOutput = out
            ignoreExitValue = true
        }
        def sha = out.toString().trim()
        return sha.isEmpty() ? 'unknown' : sha
    } catch (Exception ignored) {
        return 'unknown'
    }
}

ext.commandAvailable = { String cmd ->
    try {
        def probe = providers.exec {
            commandLine cmd, 'version'
            ignoreExitValue = true
        }
        return probe.result.get().exitValue == 0
    } catch (Exception ignored) {
        return false
    }
}

ext.sutReachable = { String healthUrl ->
    try {
        def conn = new URL(healthUrl).openConnection()
        conn.connectTimeout = 3000
        conn.readTimeout = 3000
        conn.inputStream.withCloseable { it.read() }
        return true
    } catch (Exception ignored) {
        return false
    }
}

ext.dockerBaseUrl = { String baseUrl, boolean remoteDocker ->
    if (remoteDocker) {
        return baseUrl
    }
    if (baseUrl.contains('localhost') || baseUrl.contains('127.0.0.1')) {
        return baseUrl.replace('localhost', 'host.docker.internal').replace('127.0.0.1', 'host.docker.internal')
    }
    return baseUrl
}

ext.writeSmokeArtifacts = { File outDir, Map summary, String commandText ->
    outDir.mkdirs()
    new File(outDir, 'summary.json').text =
            groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(summary))
    new File(outDir, 'command.txt').text = commandText
}

ext.dockerVolumePath = { File dir ->
    def path = dir.absolutePath.replace('\\', '/')
    if (path.matches('^[A-Za-z]:/.*')) {
        return path
    }
    return dir.absolutePath
}

ext.buildK6SmokeImage = { Project p ->
    def contextDir = p.file("${p.layout.buildDirectory.get().asFile}/docker/k6-smoke")
    def buildCmd = ['docker', 'build', '-t', 'platform-tracing-perf-harness-k6-smoke:local', contextDir.absolutePath]
    if (p.hasProperty('DockerHost')) {
        p.exec {
            environment 'DOCKER_HOST', p.property('DockerHost').toString()
            commandLine buildCmd
        }
    } else {
        p.exec { commandLine buildCmd }
    }
}

tasks.register('preparePerfAppDockerContext', Sync) {
    group = 'perf'
    description = 'Builds Docker context for perf-app (bootJar + javaagent + extension; remote Docker safe).'
    dependsOn bootJar, ':platform-tracing-otel-extension:agentExtensionJar'
    into layout.buildDirectory.dir('docker/perf-app')
    from(bootJar) {
        rename { 'sut-app.jar' }
    }
    from(configurations.otelJavaAgent) {
        rename { 'opentelemetry-javaagent.jar' }
    }
    from(project(':platform-tracing-otel-extension').tasks.named('agentExtensionJar')) {
        rename { 'platform-tracing-otel-extension-agent.jar' }
    }
    from('docker/perf-app/Dockerfile')
}

tasks.register('prepareK6SmokeDockerContext', Sync) {
    group = 'perf'
    description = 'Builds Docker context for k6 smoke (scenarios COPY — remote Docker safe).'
    into layout.buildDirectory.dir('docker/k6-smoke')
    from('scenarios/smoke.js') {
        into 'scenarios'
    }
    from('docker/k6-smoke/Dockerfile')
}

tasks.register('buildK6SmokeDockerImage') {
    group = 'perf'
    description = 'Builds platform-tracing-perf-harness-k6-smoke Docker image.'
    dependsOn 'prepareK6SmokeDockerContext'
    notCompatibleWithConfigurationCache('docker build')
    doLast {
        buildK6SmokeImage(project)
    }
}

