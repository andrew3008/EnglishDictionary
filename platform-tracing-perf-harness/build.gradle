        'perfReferenceConfirmed',
        'perfProfileId',
        'perfNamespace',
        'perfScenario',
        'perfOutputDir'
]

ext.k8sTemplateFiles = [
        'namespace.yaml',
        'perf-app-configmap.yaml',
        'perf-app-deployment.yaml',
        'perf-app-service.yaml',
        'otel-collector-configmap.yaml',
        'otel-collector-deployment.yaml',
        'otel-collector-service.yaml',
        'reference-sink-deployment.yaml',
        'reference-sink-service.yaml',
        'k6-scenarios-configmap.yaml',
        'k6-job.yaml',
        'README.md'
]

ext.referenceForbiddenRawExtensions = [
        '.jfr', '.hprof', '.heapdump', '.dump', '.tar', '.tar.gz', '.zip'
]

ext.checkReferenceArtifactHygiene = { File referenceDir ->
    if (!referenceDir.exists()) {
        return
    }
    referenceDir.eachFileRecurse { f ->
        if (!f.isFile()) {
            return
        }
        def name = f.name.toLowerCase()
        if (referenceForbiddenRawExtensions.any { name.endsWith(it) }) {
            throw new GradleException(
                    "Forbidden raw artifact under ${referenceDir.name}/: ${f.absolutePath}")
        }
        if (name.contains('prometheus-raw') || name.contains('k6-raw')) {
            throw new GradleException(
                    "Forbidden raw artifact naming under ${referenceDir.name}/: ${f.absolutePath}")
        }
    }
}

tasks.register('perfReferenceValidateConfig') {
    group = 'perf'
    description = 'Validates REFERENCE K8s templates and evidence schemas are present.'
    doLast {
        def k8sDir = file("${projectDir}/config/k8s")
        def missing = k8sTemplateFiles.findAll { !file("${k8sDir}/${it}").exists() }
        if (!missing.isEmpty()) {
            throw new GradleException("Missing K8s template files: ${missing}")
        }
        def schemas = [
                'evidence/templates/reference-summary.schema.json',
                'evidence/templates/smoke-summary.schema.json',
                'evidence/templates/W-004-resolution-checklist.md',
                'evidence/templates/PR-9H-reference-run-report-template.md',
                'evidence/templates/PR-9H-E2-preflight-checklist.md',
                'evidence/templates/PR-9H-E2-runbook.md',
                'evidence/reference/README.md',
                'config/profiles/reference-scenario-matrix.md'
        ]
        def missingSchema = schemas.findAll { !file("${projectDir}/${it}").exists() }
        if (!missingSchema.isEmpty()) {
            throw new GradleException("Missing evidence contract files: ${missingSchema}")
        }
        def collectorYaml = file("${k8sDir}/otel-collector-configmap.yaml").text
        if (!collectorYaml.contains('otlphttp/reference_sink')) {
            throw new GradleException(
                    'Collector template must use otlphttp/reference_sink for backpressure evidence')
        }
        if (collectorYaml.contains('exporters: [logging]')) {
            throw new GradleException(
                    'Collector template must not use logging as sole traces exporter')
        }
        def checklist = file("${projectDir}/evidence/templates/W-004-resolution-checklist.md").text
        def requiredTerms = [
                'cpu.per1kRps',
                'container_memory_working_set_bytes/cAdvisor',
                'constant-arrival-rate',
                'dropped_iterations',
                'throttleRatioPct',
                'jfrStartMode',
                'backpressureEvidenceValid',
                'reproductionRunCount',
                'budgetStatus'
        ]
        def missingTerms = requiredTerms.findAll { !checklist.contains(it) }
        if (!missingTerms.isEmpty()) {
            throw new GradleException("W-004 checklist missing terms: ${missingTerms}")
        }
        def gitignore = file("${rootProject.projectDir}/.gitignore").text
        if (!gitignore.contains('evidence/reference/**/*.jfr')) {
            throw new GradleException('Root .gitignore must ignore raw .jfr under evidence/reference/')
        }
        checkReferenceArtifactHygiene(file("${projectDir}/evidence/reference"))
        checkReferenceArtifactHygiene(file("${projectDir}/evidence/reference-local"))
        logger.lifecycle('REFERENCE config validation OK: {} K8s templates, {} evidence files',
                k8sTemplateFiles.size(), schemas.size())
    }
}

tasks.register('prepareK6ReferenceConfigMap') {
    group = 'perf'
    description = 'Generates k6 scenarios ConfigMap YAML from reference-steady.js (build/k8s/).'
    dependsOn 'perfReferenceValidateConfig'
    doLast {
        def scriptFile = file("${projectDir}/scenarios/reference-steady.js")
        if (!scriptFile.exists()) {
            throw new GradleException('Missing scenarios/reference-steady.js')
        }
        def indented = scriptFile.readLines().collect { "    ${it}" }.join('\n')
        def yaml = """# GENERATED — do not edit. Regenerate via prepareK6ReferenceConfigMap.
# REFERENCE tier — k6 scenario scripts ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: perf-harness-k6-scenarios
  namespace: REPLACE_NAMESPACE
  labels:
    platform-tracing.io/tier: reference-perf
data:
  reference-steady.js: |
${indented}
"""
        def out = file("${layout.buildDirectory.get().asFile}/k8s/k6-scenarios-configmap.yaml")
        out.parentFile.mkdirs()
        out.text = yaml
        logger.lifecycle('Generated k6 ConfigMap: {}', out.absolutePath)
        logger.lifecycle('Substitute REPLACE_NAMESPACE, then: kubectl apply -f {}', out.absolutePath)
    }
}

tasks.register('perfReferenceCreateSummarySkeleton') {
    group = 'perf'
    description = 'Creates E2 reference-summary skeleton (w004Eligible=false; no fake metrics).'
    dependsOn 'perfReferenceValidateConfig'
    doLast {
        def required = ['perfProfileId', 'perfScenario', 'perfRunId', 'perfNamespace', 'perfTargetRps', 'perfOutputDir']
        def missing = required.findAll { !project.hasProperty(it) }
        if (!missing.isEmpty()) {
            throw new GradleException('Missing properties for skeleton: ' + missing)
        }
        def gitSha = resolveGitSha()
        if (gitSha == 'unknown' && !project.hasProperty('perfAllowUnknownGitCommit')) {
            throw new GradleException(
                    'gitCommit is unknown. Resolve git SHA or pass -PperfAllowUnknownGitCommit=true ' +
                            '(adds missingProvenance to nonAuthoritativeReasons).')
        }
        def profileId = project.property('perfProfileId').toString()
        def scenario = project.property('perfScenario').toString()
        def runId = project.property('perfRunId').toString()
        def namespace = project.property('perfNamespace').toString()
        def targetRps = Integer.parseInt(project.property('perfTargetRps').toString())
        def outDir = file(project.property('perfOutputDir').toString())
        def normalized = outDir.absolutePath.replace('\\', '/')
        if (normalized.contains('perf-results/smoke')) {
            throw new GradleException('Output dir must not be under perf-results/smoke/')
        }
        outDir.mkdirs()

        def reasons = ['singleRunOnly', 'provisionalBudgetOnly', 'missingMetrics']
        def gitCommitValue = gitSha
        if (gitSha == 'unknown') {
            gitCommitValue = 'unknown-allowed-by-perfAllowUnknownGitCommit'
        }

        def springProfile = [
                'S0': 's0-baseline',
                'S1': 's1-tracing',
                'S2': 's2-validation-lenient-valid',
                'S3': 's3-validation-lenient-missing',
                'S4': 's4-production',
                'S5': 's5-strict-diagnostic',
                'S6': 's6-soak'
        ].get(scenario, 'REPLACE_SPRING_PROFILE')

        def skeleton = [
                evidenceTier            : 'REFERENCE',
                nonAuthoritative        : true,
                nonAuthoritativeReasons : reasons,
                w004Eligible            : false,
                profileId               : profileId,
                runId                   : runId,
                gitCommit               : gitCommitValue,
                environment             : [
                        clusterAlias        : 'REPLACE_CLUSTER',
                        namespace           : namespace,
                        cgroupVersion       : 'REPLACE_CGROUP',
                        kernelVersion       : 'REPLACE_KERNEL',
                        javaVersion         : '21',
                        springBootVersion   : 'REPLACE_SPRING_BOOT',
                        otelAgentVersion    : 'REPLACE_OTEL_AGENT',
                        otelExtensionVersion: 'REPLACE_OTEL_EXTENSION',
                        collectorImage      : 'REPLACE_COLLECTOR_IMAGE',
                        collectorVersion    : 'REPLACE_COLLECTOR_VERSION',
                        jfrStartMode        : 'startup',
                        jfrSettings         : 'REPLACE_JFR_SETTINGS'
                ],
                scenario                : [
                        scenarioId    : scenario,
                        springProfile : springProfile,
                        duration      : '10m',
                        warmupDuration: '2m',
                        targetRps     : targetRps,
                        loadModel     : 'constant-arrival-rate',
                        endpointPath  : '/perf/work'
                ],
                metrics                 : [
                        load     : [
                                executor       : 'constant-arrival-rate',
                                targetRps      : targetRps,
                                warmupSec      : 120,
                                steadyWindowSec: 600
                        ],
                        latency  : [
                                source: 'k6/http_req_duration/constant-arrival-rate'
                        ],
                        memory   : [
                                metricSource: 'container_memory_working_set_bytes/cAdvisor'
                        ],
                        collector: [
                                backpressureEvidenceValid: false,
                                exporterType             : 'otlphttp/reference_sink (populate after run)'
                        ]
                ],
                artifacts               : [
                        k6Summary           : 'k6-summary.json',
                        prometheusSnapshot  : 'prometheus-compact-summary.json',
                        command             : 'command.txt',
                        jfr                 : [
                                storageRef: 'external://REPLACE_ARTIFACT_STORE/jfr/run.jfr',
                                sha256    : 'REPLACE_SHA256'
                        ]
                ],
                classification          : [
                        w004Candidate: false,
                        w011Evidence : 'none',
                        w012Evidence : 'none'
                ],
                budgets                 : [
                        cpuOverheadPct      : [threshold: 3.0, budgetStatus: 'provisional'],
                        rssOverheadPct      : [threshold: 10.0, budgetStatus: 'provisional'],
                        p99LatencyDeltaPct  : [threshold: 15.0, budgetStatus: 'provisional'],
                        errorRatePct        : [threshold: 0.1, budgetStatus: 'provisional']
                ],
                reproducibility         : [
                        reproductionRunCount: 1
                ],
                caveats                 : [
                        missingMetrics                  : [
                                'Populate after cluster run — skeleton only',
                                'achievedRpsAvg', 'cpu.per1kRps', 'memory.workingSetBytesAvg',
                                'latency.p95Ms', 'latency.p99Ms', 'gc summary', 'collector queue metrics'
                        ],
                        notForProductionReadinessReason : 'E2 first run: single-run, provisional budgets'
                ]
        ]

        def summaryFile = new File(outDir, 'reference-summary.json')
        summaryFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(skeleton))
        new File(outDir, 'command.txt').text = '# Populate with exact kubectl/k6/PromQL commands from PR-9H-E2-runbook.md\n'
        logger.lifecycle('Created E2 skeleton (non-authoritative): {}', summaryFile.absolutePath)
        logger.lifecycle('Fill metrics from cluster captures. Copy compact files to evidence/reference/{}/{}/', profileId, runId)
    }
}

