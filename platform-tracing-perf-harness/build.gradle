tasks.register('perfReferenceCreateLocalLabSummarySkeleton') {
    group = 'perf'
    description = 'Creates LOCAL_REFERENCE_LAB summary skeleton (w004Eligible=false; no fake metrics).'
    dependsOn 'perfReferenceValidateLocalLabConfig'
    doLast {
        def required = ['perfProfileId', 'perfScenario', 'perfRunId', 'perfNamespace', 'perfOutputDir']
        def missing = required.findAll { !project.hasProperty(it) }
        if (!missing.isEmpty()) {
            throw new GradleException('Missing properties for local lab skeleton: ' + missing)
        }
        def gitSha = resolveGitSha()
        if (gitSha == 'unknown' && !project.hasProperty('perfAllowUnknownGitCommit')) {
            throw new GradleException(
                    'gitCommit unknown. Use -PperfAllowUnknownGitCommit=true for local lab skeleton.')
        }
        def profileId = project.property('perfProfileId').toString()
        def scenario = project.property('perfScenario').toString()
        def runId = project.property('perfRunId').toString()
        def namespace = project.property('perfNamespace').toString()
        def targetRps = project.hasProperty('perfTargetRps')
                ? Integer.parseInt(project.property('perfTargetRps').toString()) : 0
        def outDir = file(project.property('perfOutputDir').toString())
        outDir.mkdirs()

        def reasons = ['localEnvironment', 'singleRunOnly', 'provisionalBudgetOnly', 'missingMetrics']
        def springProfile = [
                'S0': 's0-baseline', 'S1': 's1-tracing', 'S4': 's4-production'
        ].get(scenario, 's4-production')

        def skeleton = [
                evidenceTier            : 'REFERENCE',
                labTier                 : 'LOCAL_REFERENCE_LAB',
                nonAuthoritative        : true,
                nonAuthoritativeReasons : reasons,
                w004Eligible            : false,
                profileId               : profileId,
                runId                   : runId,
                gitCommit               : gitSha == 'unknown' ? 'unknown-local-lab' : gitSha,
                environment             : [
                        clusterAlias : 'kind-platform-tracing-reference-lab',
                        namespace    : namespace,
                        cgroupVersion: 'v2',
                        kernelVersion: 'REPLACE_KERNEL',
                        javaVersion  : '21',
                        jfrStartMode : 'startup'
                ],
                scenario                : [
                        scenarioId    : scenario,
                        springProfile : springProfile,
                        duration      : '10m',
                        warmupDuration: '2m',
                        loadModel     : 'constant-arrival-rate',
                        endpointPath  : '/perf/work'
                ] + (targetRps > 0 ? [targetRps: targetRps] : [:]),
                metrics                 : [
                        load     : [
                                executor       : 'constant-arrival-rate',
                                warmupSec      : 120,
                                steadyWindowSec: 600
                        ] + (targetRps > 0 ? [targetRps: targetRps] : [:]),
                        collector: [backpressureEvidenceValid: false]
                ],
                artifacts               : [
                        command: 'command.txt',
                        jfr    : [
                                storageRef: 'file:///var/tmp/platform-tracing-reference-lab-artifacts/REPLACE/run.jfr',
                                sha256    : 'REPLACE_SHA256'
                        ]
                ],
                classification          : [
                        w004Candidate: false,
                        w011Evidence : 'none',
                        w012Evidence : 'none'
                ],
                budgets                 : [
                        cpuOverheadPct     : [threshold: 3.0, budgetStatus: 'provisional'],
                        rssOverheadPct     : [threshold: 10.0, budgetStatus: 'provisional'],
                        p99LatencyDeltaPct : [threshold: 15.0, budgetStatus: 'provisional'],
                        errorRatePct       : [threshold: 0.1, budgetStatus: 'provisional']
                ],
                reproducibility         : [reproductionRunCount: 1],
                caveats                 : [
                        missingMetrics                  : [
                                'Populate after local lab run — skeleton only',
                                'achievedRpsAvg', 'cpu.per1kRps', 'memory.workingSetBytesAvg',
                                'collector.backpressureEvidence'
                        ],
                        notForProductionReadinessReason : 'LOCAL_REFERENCE_LAB; not SRE/pre-prod evidence'
                ]
        ]
        def summaryFile = new File(outDir, 'reference-summary.json')
        summaryFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(skeleton))
        new File(outDir, 'command.txt').text = '# LOCAL_REFERENCE_LAB — PR-9H-E2L runbook commands\n'
        logger.lifecycle('Created LOCAL lab skeleton: {}', summaryFile.absolutePath)
        logger.lifecycle('labTier=LOCAL_REFERENCE_LAB w004Eligible=false — fill metrics from captures only')
    }
}

tasks.register('perfReferencePlan') {
    group = 'perf'
    description = 'Prints PR-9H-E2 REFERENCE run plan (no automated cluster execution).'
    dependsOn 'perfReferenceValidateConfig'
    doLast {
        def profileId = project.findProperty('perfProfileId') ?: '(required: -PperfProfileId=)'
        def namespace = project.findProperty('perfNamespace') ?: '(required: -PperfNamespace=)'
        def targetRps = project.findProperty('perfTargetRps') ?: '(required: calibrate then -PperfTargetRps=)'
        def sinkImage = project.findProperty('perfReferenceSinkImage') ?: '(required: -PperfReferenceSinkImage=)'
        def artifactStore = project.findProperty('perfArtifactStore') ?: '(required: -PperfArtifactStore=)'
        def runId = new Date().format("yyyyMMdd-HHmmss")
        logger.lifecycle('')
        logger.lifecycle('=== PR-9H-E2 REFERENCE run plan (manual cluster execution) ===')
        logger.lifecycle('Profile id:     {}', profileId)
        logger.lifecycle('Suggested runId: {}', runId)
        logger.lifecycle('Namespace:      {}', namespace)
        logger.lifecycle('TARGET_RPS:     {} (same for S0/S1/S4)', targetRps)
        logger.lifecycle('Reference sink: {}', sinkImage)
        logger.lifecycle('Artifact store: {}', artifactStore)
        logger.lifecycle('')
        logger.lifecycle('Required scenarios: S0, S1, S4')
        logger.lifecycle('Optional:           S2, S3')
        logger.lifecycle('Deferred:           S5 (diagnostic), S6 (soak PR-9H-F)')
        logger.lifecycle('')
        logger.lifecycle('Environment prerequisites (must be satisfied before run):')
        logger.lifecycle('  1. Complete evidence/templates/PR-9H-E2-preflight-checklist.md')
        logger.lifecycle('  2. Reference sink image approved and deployed')
        logger.lifecycle('  3. TARGET_RPS calibrated (~60-70%% S0 saturation)')
        logger.lifecycle('  4. prepareK6ReferenceConfigMap -> build/k8s/k6-scenarios-configmap.yaml')
        logger.lifecycle('  5. Prometheus/cAdvisor + collector self-metrics scrape verified')
        logger.lifecycle('  6. External JFR store + sha256 process defined')
        logger.lifecycle('  7. gitCommit resolved (not unknown)')
        logger.lifecycle('')
        logger.lifecycle('Required artifacts per scenario:')
        logger.lifecycle('  reference-summary.json, k6-summary.json, prometheus-compact-summary.json')
        logger.lifecycle('  jfr-summary.json, command.txt, checksums.txt (raw JFR external only)')
        logger.lifecycle('')
        logger.lifecycle('E2 non-claims (mandatory):')
        logger.lifecycle('  - w004Eligible MUST remain false')
        logger.lifecycle('  - nonAuthoritative=true; reasons: singleRunOnly, provisionalBudgetOnly')
        logger.lifecycle('  - W-004 remains OPEN')
        logger.lifecycle('  - W-011/W-012 unchanged by default')
        logger.lifecycle('  - No raw dumps committed under evidence/reference/')
        logger.lifecycle('  - No SMOKE artifacts mixed into REFERENCE outputs')
        logger.lifecycle('')
        logger.lifecycle('Commands:')
        logger.lifecycle('  ./gradlew :platform-tracing-perf-harness:prepareK6ReferenceConfigMap')
        logger.lifecycle('  ./gradlew :platform-tracing-perf-harness:perfReferenceCreateSummarySkeleton \\')
        logger.lifecycle('    -PperfProfileId={} -PperfScenario=S4 -PperfRunId={} \\', profileId, runId)
        logger.lifecycle('    -PperfNamespace={} -PperfTargetRps={} \\', namespace, targetRps)
        logger.lifecycle('    -PperfOutputDir=build/perf-results/reference/{}/{}', profileId, runId)
        logger.lifecycle('')
        logger.lifecycle('Runbook: evidence/templates/PR-9H-E2-runbook.md')
        logger.lifecycle('')
        def envMissing = []
        if (namespace.startsWith('(')) envMissing << 'perfNamespace'
        if (targetRps.toString().startsWith('(')) envMissing << 'perfTargetRps'
        if (sinkImage.startsWith('(')) envMissing << 'perfReferenceSinkImage'
        if (artifactStore.startsWith('(')) envMissing << 'perfArtifactStore'
        if (!envMissing.isEmpty()) {
            logger.lifecycle('STATUS: E2 scaffolding ready; environment prerequisites MISSING: {}', envMissing)
            logger.lifecycle('Do not fabricate evidence. Complete pre-flight before cluster run.')
        } else {
            logger.lifecycle('STATUS: Environment properties provided — proceed via manual runbook only.')
        }
        logger.lifecycle('')
    }
}

tasks.register('perfReferenceRun') {
    group = 'perf'
    description = 'REFERENCE tier — validates E2 properties; refuses automated cluster execution.'
    dependsOn 'perfReferenceValidateConfig'
    doLast {
        def missing = referenceRequiredProps.findAll { !project.hasProperty(it) }
        if (!missing.isEmpty()) {
            logger.lifecycle('')
            logger.lifecycle('REFUSE perfReferenceRun: missing required properties: {}', missing)
            logger.lifecycle('Required:')
            referenceRequiredProps.each { prop ->
                logger.lifecycle('  -P{}=...', prop)
            }
            logger.lifecycle('')
            logger.lifecycle('Run perfReferencePlan first:')
            logger.lifecycle('  ./gradlew :platform-tracing-perf-harness:perfReferencePlan -PperfProfileId=<id>')
            logger.lifecycle('')
            throw new GradleException(
                    'REFERENCE run refused: missing properties ' + missing +
                            '. SMOKE/local artifacts cannot satisfy W-004.')
        }
        if (project.property('perfReferenceConfirmed').toString() != 'true') {
            throw new GradleException(
                    'REFERENCE run refused: -PperfReferenceConfirmed=true required. ' +
                            'This tier is Kubernetes/pre-prod only — not local SMOKE.')
        }
        def outputDir = file(project.property('perfOutputDir').toString())
        def normalizedOutput = outputDir.absolutePath.replace('\\', '/')
        if (normalizedOutput.contains('perf-results/smoke')) {
            throw new GradleException(
                    'REFERENCE run refused: output dir must not be under perf-results/smoke/')
        }
        if (!normalizedOutput.contains('perf-results/reference')) {
            throw new GradleException(
                    'REFERENCE run refused: output dir must be under build/perf-results/reference/')
        }
        def e2EnvProps = [
                'perfReferenceSinkImage',
                'perfTargetRps',
                'perfArtifactStore'
        ]
        def envMissing = e2EnvProps.findAll { !project.hasProperty(it) }
        if (!envMissing.isEmpty()) {
            throw new GradleException(
                    'E2 environment prerequisites missing: ' + envMissing +
                            '. Cannot proceed. See PR-9H-E2-preflight-checklist.md. ' +
                            'Do not fabricate reference evidence.')
        }
        if (!project.hasProperty('perfReferenceExecuteCluster') ||
                project.property('perfReferenceExecuteCluster').toString() != 'true') {
            throw new GradleException(
                    'Automated kubectl execution is not implemented. ' +
                            'Properties validated for profile=' + project.property('perfProfileId') +
                            ', scenario=' + project.property('perfScenario') +
                            ', namespace=' + project.property('perfNamespace') +
                            '. Execute manually via evidence/templates/PR-9H-E2-runbook.md. ' +
                            'Use perfReferenceCreateSummarySkeleton after capture.')
        }
        throw new GradleException(
                'Even with -PperfReferenceExecuteCluster=true, automated cluster execution is refused. ' +
                        'Use manual runbook. Never fabricate metrics.')
    }
}

tasks.register('perfSmoke') {
    group = 'perf'
    description = 'Local SMOKE tier: k6 functional run (local k6 or Docker). Skips cleanly if unavailable.'
    dependsOn 'prepareK6SmokeDockerContext'
    notCompatibleWithConfigurationCache('Exec + dynamic probes')

    doLast {
        def baseUrl = (project.findProperty('perfBaseUrl') ?: project.findProperty('perfSmokeBaseUrl') ?: 'http://localhost:8080').toString()
        def duration = (project.findProperty('perfSmokeDuration') ?: '30s').toString()
        def targetRps = Integer.parseInt((project.findProperty('perfSmokeTargetRps') ?: project.findProperty('perfSmokeRps') ?: '5').toString())
        def springProfile = (project.findProperty('perfProfiles') ?: 'smoke').toString()
        def profileId = (project.findProperty('perfProfileId') ?: 'local-dev').toString()
        def healthUrl = "${baseUrl}/perf/health"

        if (!sutReachable(healthUrl)) {
            logger.lifecycle("SKIP perfSmoke: SUT not reachable at {} — start bootRun first", healthUrl)
            logger.lifecycle('  ./gradlew :platform-tracing-perf-harness:bootRun -PperfProfiles={}', springProfile)
            return
        }

        def k6Local = commandAvailable('k6')
        def dockerAvailable = commandAvailable('docker')
        def useDocker = project.hasProperty('perfSmokeUseDocker') || (!k6Local && dockerAvailable)
        def remoteDocker = project.hasProperty('DockerHost')
        def timestamp = new Date().format("yyyyMMdd-HHmmss")
        def outDir = project.hasProperty('perfSmokeOutputDir')
                ? file(project.property('perfSmokeOutputDir'))
                : file("${layout.buildDirectory.get().asFile}/perf-results/smoke/${timestamp}")
        outDir.mkdirs()

        if (!k6Local && !useDocker) {
            logger.lifecycle('SKIP perfSmoke: k6 not on PATH and Docker not available.')
            logger.lifecycle('  Install k6, or run with -PperfSmokeUseDocker=true (requires Docker).')
            logger.lifecycle('  Remote lab: -PDockerHost=tcp://192.168.100.70:2375 -PperfBaseUrl=http://<host-from-gentoo>:8080')
            return
        }

        if (useDocker && dockerAvailable && remoteDocker && System.getProperty('os.name').toLowerCase().contains('windows')) {
            logger.lifecycle('Delegating to PowerShell runner for remote Docker.')
            def psScript = file("${projectDir}/scripts/run-perf-smoke.ps1").absolutePath
            exec {
                commandLine 'powershell', '-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', psScript,
                        '-DockerHost', project.property('DockerHost').toString(),
                        '-BaseUrl', dockerBaseUrl(baseUrl, true),
                        '-Duration', duration,
                        '-TargetRps', targetRps.toString(),
                        '-SpringProfile', springProfile,
                        '-OutDir', outDir.absolutePath
            }
            logger.lifecycle('SMOKE artifacts (non-authoritative): {}', outDir)
            return
        }

        def gitSha = resolveGitSha()
        def k6SummaryFile = new File(outDir, 'k6-summary.json')
        def k6Runner
        def commandText
        Integer k6ExitCode = null

        if (k6Local && !project.hasProperty('perfSmokeUseDocker')) {
            k6Runner = 'local'
            commandText = "k6 run --summary-export ${k6SummaryFile.absolutePath} scenarios/smoke.js"
            exec {
                environment 'BASE_URL', baseUrl
                environment 'DURATION', duration
                environment 'TARGET_RPS', targetRps.toString()
                environment 'SCENARIO', 'smoke'
                environment 'SPRING_PROFILE', springProfile
                commandLine 'k6', 'run',
                        '--summary-export', k6SummaryFile.absolutePath,
                        file("${projectDir}/scenarios/smoke.js").absolutePath
            }
        } else if (useDocker && dockerAvailable) {
            buildK6SmokeImage(project)
            k6Runner = remoteDocker ? 'docker-remote' : 'docker-local'
            def dockerUrl = dockerBaseUrl(baseUrl, remoteDocker)
            def k6SummaryInContainer = '/artifacts/k6-summary.json'
            commandText = "docker create/start/cp ${dockerUrl} platform-tracing-perf-harness-k6-smoke:local"
            def dockerEnv = [
                    "BASE_URL=${dockerUrl}",
                    "DURATION=${duration}",
                    "TARGET_RPS=${targetRps.toString()}",
                    'SCENARIO=smoke',
                    "SPRING_PROFILE=${springProfile}"
            ]
            def cidOut = new ByteArrayOutputStream()
            def createCmd = ['docker', 'create'] + dockerEnv.collectMany { ['-e', it] } + [
                    'platform-tracing-perf-harness-k6-smoke:local',
                    'run', '/scenarios/smoke.js', '--summary-export', k6SummaryInContainer
            ]
            if (remoteDocker) {
                exec {
                    environment 'DOCKER_HOST', project.property('DockerHost').toString()
                    commandLine createCmd
                    standardOutput = cidOut
                }
            } else {
                exec {
                    commandLine createCmd
                    standardOutput = cidOut
                }
            }
            def cid = cidOut.toString().trim()
            try {
                if (remoteDocker) {
                    k6ExitCode = providers.exec {
                        environment 'DOCKER_HOST', project.property('DockerHost').toString()
                        commandLine 'docker', 'start', '-a', cid
                        ignoreExitValue = true
                    }.result.get().exitValue
                    exec {
                        environment 'DOCKER_HOST', project.property('DockerHost').toString()
                        commandLine 'docker', 'cp', "${cid}:${k6SummaryInContainer}", k6SummaryFile.absolutePath
                        ignoreExitValue = true
                    }
                } else {
                    k6ExitCode = providers.exec {
                        commandLine 'docker', 'start', '-a', cid
                        ignoreExitValue = true
                    }.result.get().exitValue
                    exec {
                        commandLine 'docker', 'cp', "${cid}:${k6SummaryInContainer}", k6SummaryFile.absolutePath
                        ignoreExitValue = true
                    }
                }
                if (k6ExitCode != 0) {
                    logger.lifecycle('WARN perfSmoke: k6 exited {} — SMOKE tier is non-gating; check BASE_URL reachability from Docker host', k6ExitCode)
                }
            } finally {
                if (remoteDocker) {
                    exec {
                        environment 'DOCKER_HOST', project.property('DockerHost').toString()
                        commandLine 'docker', 'rm', '-f', cid
                        ignoreExitValue = true
                    }
                } else {
                    exec {
                        commandLine 'docker', 'rm', '-f', cid
                        ignoreExitValue = true
                    }
                }
            }
        } else {
            logger.lifecycle('SKIP perfSmoke: no k6 runner available.')
            return
        }

        def summary = [
                evidenceTier     : 'SMOKE',
                nonAuthoritative : true,
                w004Eligible     : false,
                profileId        : profileId,
                runId            : timestamp,
                scenario         : 'smoke',
                springProfile    : springProfile,
                baseUrl          : baseUrl,
                duration         : duration,
                targetRps        : targetRps,
                k6Runner         : k6Runner,
                gitSha           : gitSha,
                k6Summary        : 'k6-summary.json',
                note             : 'Functional smoke only — not W-004 or pre-prod evidence'
        ]
        if (k6ExitCode != null) {
            summary.k6ExitCode = k6ExitCode
        }
        writeSmokeArtifacts(outDir, summary, commandText)
        logger.lifecycle('SMOKE executed via {} — artifacts (non-authoritative): {}', k6Runner, outDir)
    }
}

