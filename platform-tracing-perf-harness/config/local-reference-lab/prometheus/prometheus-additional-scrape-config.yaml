# Additional scrape jobs for LOCAL_REFERENCE_LAB (PR-9H-E2L-FULL).
# Merged into prometheus-values-kind.yaml via install-prometheus-kind.sh.
# Collector discovered by pod label — no hardcoded pod IPs.

- job_name: perf-harness-collector
  kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
          - platform-tracing-reference-lab
  relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      regex: perf-harness-collector
      action: keep
    - source_labels: [__meta_kubernetes_pod_ip]
      target_label: __address__
      replacement: ${1}:8888
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace
