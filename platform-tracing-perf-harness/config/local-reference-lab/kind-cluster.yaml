# kind cluster config — PR-9H-E2L local reference lab
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: platform-tracing-reference-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "platform-tracing.io/lab-tier=LOCAL_REFERENCE_LAB"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
